<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع الموقع الجغرافي</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; line-height: 1.6; }
        .location-box { border: 2px solid #333; padding: 20px; display: inline-block; border-radius: 10px; }
        h1 { color: #2c3e50; }
        .coords { font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>

    <h1>مرحباً بك!</h1>
    <div class="location-box">
        <p id="status">جاري تحديد موقعك...</p>
        <p id="output"></p>
    </div>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        function getLocation() {
            if (!navigator.geolocation) {
                status.textContent = "عذراً، متصفحك لا يدعم تحديد الموقع.";
            } else {
                navigator.geolocation.getCurrentPosition(success, error);
            }
        }

        function success(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            status.textContent = "هذا هو موقعك الحالي (خطوط الطول والعرض):";
            output.innerHTML = `
                <div class="coords">خط العرض: ${lat}</div>
                <div class="coords">خط الطول: ${lng}</div>
            `;
        }

        function error() {
            status.textContent = "لا يمكن الوصول إلى موقعك. يرجى تفعيل خاصية الموقع في المتصفح.";
        }

        window.onload = getLocation;
    </script>
</body>
</html>
