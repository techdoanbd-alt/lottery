<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل مواقع الزوار</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        .status { padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #e8f0fe; color: #1967d2; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #1a73e8; color: white; }
        
        .map-btn { background-color: #34a853; color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; font-size: 14px; display: inline-block; }
        .map-btn:hover { background-color: #2d8e47; }
        tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h1>سجل إحداثيات الزوار</h1>
    <div id="status" class="status">جاري طلب إذن الموقع وحفظ البيانات...</div>

    <table>
        <thead>
            <tr>
                <th>الوقت والتاريخ</th>
                <th>خط العرض (Latitude)</th>
                <th>خط الطول (Longitude)</th>
                <th>الخريطة</th>
            </tr>
        </thead>
        <tbody id="log-table">
            </tbody>
    </table>
</div>

<script type="module">
  // 1. Import required Firebase v12 functions
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

  // 2. Your specific configuration
  const firebaseConfig = {
    apiKey: "AIzaSyA15ZYVyMWVNwLMwhSME_brqjDdO7thW78",
    authDomain: "lottery-aa0db.firebaseapp.com",
    projectId: "lottery-aa0db",
    storageBucket: "lottery-aa0db.firebasestorage.app",
    messagingSenderId: "77879199914",
    appId: "1:77879199914:web:726e1723dcad958e9be8d3",
    measurementId: "G-X3X7SCF2BG"
  };

  // 3. Initialize Firebase & Database
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const visitsRef = ref(db, 'visitor_logs');

  const statusDiv = document.getElementById('status');
  const tableBody = document.getElementById('log-table');

  // 4. Function to get and save location
  function logLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const time = new Date().toLocaleString('ar-EG');

        // Save to Firebase Realtime Database
        push(visitsRef, {
          latitude: lat,
          longitude: lng,
          timestamp: time
        });

        statusDiv.innerHTML = `تم حفظ موقعك بنجاح! <br> خط العرض: ${lat} | خط الطول: ${lng}`;
        statusDiv.style.background = "#e6fffa";
        statusDiv.style.color = "#2c7a7b";
      }, (error) => {
        statusDiv.innerText = "خطأ: يرجى السماح للمتصفح بالوصول للموقع.";
        statusDiv.style.background = "#fff5f5";
        statusDiv.style.color = "#c53030";
      });
    } else {
      statusDiv.innerText = "متصفحك لا يدعم خاصية تحديد الموقع.";
    }
  }

  // 5. Listen for database updates and fill the table
  onValue(visitsRef, (snapshot) => {
    tableBody.innerHTML = ""; // Clear existing rows
    const data = snapshot.val();
    
    if (data) {
        // Convert object to array and reverse to show newest first
        const entries = Object.values(data).reverse();
        
        entries.forEach(entry => {
            const row = `
                <tr>
                    <td>${entry.timestamp}</td>
                    <td>${entry.latitude.toFixed(6)}</td>
                    <td>${entry.longitude.toFixed(6)}</td>
                    <td>
                        <a href="https://www.google.com/maps?q=${entry.latitude},${entry.longitude}" 
                           target="_blank" class="map-btn">فتح الخريطة</a>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }
  });

  // Start tracking on load
  logLocation();
</script>

</body>
</html>
