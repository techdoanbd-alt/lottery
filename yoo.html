<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل مواقع الزوار - Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        .status { padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #e8f0fe; color: #1967d2; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #1a73e8; color: white; }
        
        .map-btn { background-color: #34a853; color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; font-size: 14px; display: inline-block; }
        tr:hover { background-color: #f8f9fa; }

        /* Admin Section Styling */
        .admin-section { margin-top: 40px; padding: 20px; border-top: 2px dashed #ddd; }
        .delete-btn { background-color: #d93025; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background-color: #a50e0e; }
        input[type="password"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>سجل إحداثيات الزوار</h1>
    <div id="status" class="status">جاري طلب إذن الموقع وحفظ البيانات...</div>

    <table>
        <thead>
            <tr>
                <th>الوقت والتاريخ</th>
                <th>خط العرض (Lat)</th>
                <th>خط الطول (Lng)</th>
                <th>الخريطة</th>
            </tr>
        </thead>
        <tbody id="log-table"></tbody>
    </table>

    <div class="admin-section">
        <h3>لوحة تحكم المسؤول</h3>
        <input type="password" id="adminPass" placeholder="كلمة المرور">
        <button class="delete-btn" id="deleteBtn">حذف جميع البيانات</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA15ZYVyMWVNwLMwhSME_brqjDdO7thW78",
    authDomain: "lottery-aa0db.firebaseapp.com",
    projectId: "lottery-aa0db",
    storageBucket: "lottery-aa0db.firebasestorage.app",
    messagingSenderId: "77879199914",
    appId: "1:77879199914:web:726e1723dcad958e9be8d3",
    measurementId: "G-X3X7SCF2BG"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const visitsRef = ref(db, 'visitor_logs');

  // --- DELETE LOGIC ---
  const MASTER_PASSWORD = "mysecretpassword123"; // CHANGE THIS PASSWORD

  document.getElementById('deleteBtn').addEventListener('click', () => {
      const enteredPass = document.getElementById('adminPass').value;
      if (enteredPass === MASTER_PASSWORD) {
          if (confirm("هل أنت متأكد من حذف جميع السجلات؟ لا يمكن التراجع!")) {
              remove(visitsRef)
              .then(() => alert("تم حذف جميع البيانات بنجاح."))
              .catch((err) => alert("حدث خطأ: " + err));
          }
      } else {
          alert("كلمة مرور خاطئة!");
      }
  });

  // --- EXISTING LOGIC ---
  function logLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((position) => {
        push(visitsRef, {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          timestamp: new Date().toLocaleString('ar-EG')
        });
        document.getElementById('status').innerText = "تم تسجيل دخولك بنجاح.";
      }, () => {
        document.getElementById('status').innerText = "فشل في الحصول على الموقع.";
      });
    }
  }

  onValue(visitsRef, (snapshot) => {
    const tableBody = document.getElementById('log-table');
    tableBody.innerHTML = "";
    const data = snapshot.val();
    if (data) {
        Object.values(data).reverse().forEach(entry => {
            tableBody.innerHTML += `
                <tr>
                    <td>${entry.timestamp}</td>
                    <td>${entry.latitude.toFixed(6)}</td>
                    <td>${entry.longitude.toFixed(6)}</td>
                    <td><a href="https://www.google.com/maps?q=${entry.latitude},${entry.longitude}" target="_blank" class="map-btn">فتح الخريطة</a></td>
                </tr>`;
        });
    }
  });

  window.onload = logLocation;
</script>

</body>
</html>
